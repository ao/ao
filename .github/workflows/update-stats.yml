name: Update stats

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live stats and rewrite README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          USER="${{ github.repository_owner }}"

          # public repos + followers straight off the user object
          read REPOS FOLLOWERS < <(gh api "users/$USER" \
            --jq '"\(.public_repos) \(.followers)"')

          # total stars across owned (non-fork) repos, paginated
          STARS=$(gh api --paginate "users/$USER/repos?per_page=100&type=owner" \
            --jq '.[] | select(.fork == false) | .stargazers_count' \
            | awk '{s+=$1} END {print s+0}')

          LINE="  ${REPOS} public   ·   ${STARS} stars   ·   ${FOLLOWERS} followers"
          echo "New line: $LINE"

          python3 - "$LINE" <<'PY'
          import re, sys, pathlib
          line = sys.argv[1]
          p = pathlib.Path("README.md")
          text = p.read_text()
          # Match the stats line by its shape: "<n> public · <n> stars · <n> followers"
          new = re.sub(
              r"^ *\d+ public.*?\d+ stars.*?\d+ followers *$",
              line,
              text, count=1, flags=re.MULTILINE,
          )
          if new != text:
              p.write_text(new)
              print("README updated")
          else:
              print("No change")
          PY

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh live stats"
            git push
          else
            echo "Nothing to commit."
          fi
